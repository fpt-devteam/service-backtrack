services:
  qwen-reranker:
    image: vllm/vllm-openai:latest
    container_name: qwen-reranker
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - qwen-reranker-model-cache:/root/.cache/huggingface
    ports:
      - "8888:8888"
    entrypoint: [
      "vllm", "serve", "Qwen/Qwen3-Reranker-0.6B",
      "--port", "8888",
      "--host", "0.0.0.0",
      "--trust-remote-code",
      "--max-model-len", "4096",
      "--gpu-memory-utilization", "0.5",
      "--hf_overrides", "{\"architectures\":[\"Qwen3ForSequenceClassification\"],\"classifier_from_token\":[\"no\",\"yes\"],\"is_original_qwen3_reranker\":true}"
    ]
    networks:
      - backtrack-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  backtrack-network:
    external: true
    name: service-backtrack_backtrack-network

volumes:
  qwen-reranker-model-cache: